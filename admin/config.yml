# =====================================================
# Sveltia CMS — Painel Admin do Dev Log
# Docs: https://github.com/sveltia/sveltia-cms
# =====================================================

backend:
  name: github
  repo: AndreMicael/blog-devlog   # <-- seu repositório
  branch: main
  base_url: https://andremicael.com/oauth  # proxy OAuth hospedado no Hostgator

# Onde ficam as imagens enviadas pelo painel
media_folder: "assets/images/uploads"
public_folder: "/blog-devlog/assets/images/uploads"

# Idioma do painel
locale: pt

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: Frontend
        field: categories
        pattern: Frontend
      - label: Backend
        field: categories
        pattern: Backend
    fields:
      - { label: "Layout",     name: "layout",     widget: "hidden",   default: "post" }
      - { label: "Título",     name: "title",      widget: "string",   hint: "Título do post" }
      - { label: "Data",       name: "date",       widget: "datetime", format: "YYYY-MM-DD HH:mm:ss ZZ" }
      - label: "Categorias"
        name: "categories"
        widget: "select"
        options: ["Frontend", "Backend", "Mobile", "DevOps", "Desenvolvimento"]
        multiple: true
      - label: "Tags"
        name: "tags"
        widget: "list"
        hint: "Pressione Enter para adicionar cada tag"
      - { label: "Repositório (URL)", name: "repo", widget: "string", required: false }
      - label: "Imagem de capa"
        name: "image"
        widget: "image"
        required: false
        hint: "Imagem opcional para o post"
      - { label: "Conteúdo",   name: "body",       widget: "markdown" }
