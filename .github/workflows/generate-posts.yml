name: Gerar Posts do Blog a partir de Commits

on:
  schedule:
    # Roda todo dia às 9h (horário UTC = 6h BRT)
    # Para mudar: https://crontab.guru
    - cron: "0 12 * * *"

  # Permite rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necessário para commitar os posts gerados

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar acesso ao GitHub
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Testando acesso à API do GitHub..."
          curl -s -o /dev/null -w "Status usuario: %{http_code}\n" \
            -H "Authorization: token $GH_PAT" \
            https://api.github.com/user
          curl -s -o /dev/null -w "Status Frontend: %{http_code}\n" \
            -H "Authorization: token $GH_PAT" \
            https://api.github.com/repos/Desenvolve-MT/Sistema-Contratos-Frontend
          curl -s -o /dev/null -w "Status Backend: %{http_code}\n" \
            -H "Authorization: token $GH_PAT" \
            https://api.github.com/repos/Desenvolve-MT/Sistema-Contratos-Backend

      - name: Gerar posts com Gemini
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commitar e publicar posts gerados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p _posts
          git add _posts/ last_processed.json 2>/dev/null || true
          # Só faz commit se houver mudanças
          if git diff --staged --quiet; then
            echo "Nenhum post novo para commitar."
          else
            git commit -m "blog: posts gerados automaticamente [skip ci]"
            git push
            echo "Posts publicados com sucesso!"
          fi
