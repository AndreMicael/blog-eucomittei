name: Gerar e Publicar Posts do Blog

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "_posts/**"
      - "last_processed.json"

  schedule:
    # Roda todo dia às 9h (horário UTC = 6h BRT)
    - cron: "0 12 * * *"

  # Permite rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  gerar-posts:
    name: Gerar Posts com IA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar acesso ao GitHub
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Testando acesso à API do GitHub..."
          curl -s -o /dev/null -w "Status usuario: %{http_code}\n" \
            -H "Authorization: token $GH_PAT" \
            https://api.github.com/user
          curl -s -o /dev/null -w "Status Frontend: %{http_code}\n" \
            -H "Authorization: token $GH_PAT" \
            https://api.github.com/repos/Desenvolve-MT/Sistema-Contratos-Frontend
          curl -s -o /dev/null -w "Status Backend: %{http_code}\n" \
            -H "Authorization: token $GH_PAT" \
            https://api.github.com/repos/Desenvolve-MT/Sistema-Contratos-Backend

      - name: Gerar posts com Groq
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commitar posts gerados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p _posts
          git add _posts/ last_processed.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nenhum post novo para commitar."
          else
            git commit -m "blog: posts gerados automaticamente [skip ci]"
            git push
            echo "Posts commitados com sucesso!"
          fi

  build-jekyll:
    name: Build do Jekyll
    runs-on: ubuntu-latest
    needs: gerar-posts

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build com Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy no GitHub Pages
    runs-on: ubuntu-latest
    needs: build-jekyll
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
